# scp stage5 DPO config — mirror of scp_stage4_sft_v2 where applicable.
# Every value here is consumed explicitly by scripts/train_dpo.py — no fallbacks.

model:
  # HF model repo holding the SFT checkpoint (uploaded via scripts/upload_sft_checkpoint.py).
  # Override via --model on the CLI if you switch checkpoints.
  name_or_path: alwaysgood/qwen35_sft_023
  # mirrored from scp_stage4_sft_v2/configs/model.yaml
  max_length: 4096            # full sequence cap (prompt + response)
  max_prompt_length: 2048     # prompt portion cap (mirrors stage4 max_source_tokens=1700 + headroom)
  dtype: bf16
  attention_impl: flash_attention_2
  padding_side: left
  trust_remote_code: false

data:
  train_path: data/processed/dpo_train.jsonl
  eval_path: data/processed/dpo_val.jsonl
  prompt_field: prompt
  chosen_field: chosen
  rejected_field: rejected

dpo:
  # Default: sigmoid (vanilla DPO). Switch to apo_zero for the
  # "increase chosen logp" + "decrease rejected logp" decoupled
  # objective (helps when sigmoid shows the "rejected down, chosen
  # flat" pattern). Override per-run via `sed -i 's/loss_type: .../...'`
  # before train_dpo.py, or by editing this file in a branch.
  loss_type: sigmoid
  beta: 0.1
  label_smoothing: 0.0
  reference_free: false
  precompute_ref_log_probs: true   # frees ref model from GPU after first pass
  # Precompute is forward-only but Qwen3.5 has a HUGE vocab (~248k) and DPO
  # concatenates chosen+rejected per batch (effective 2x batch). The lm_head
  # logits dominate memory and pad to the longest seq in each batch:
  #   bytes ≈ (2 * batch) * max_seq_in_batch * vocab * 2
  # Our data has max prompt+rejected ≈ 3765 (rare long-tail rows), so a
  # batch that happens to contain one of those needs:
  #   batch=16: 32 * 3765 * 248044 * 2 ≈ 56 GB  -> OOM
  #   batch=8 : 16 * 3765 * 248044 * 2 ≈ 28 GB  -> tight, sometimes OOM
  #   batch=4 :  8 * 3765 * 248044 * 2 ≈ 14 GB  -> safe with margin
  # batch=4 gives ~4x speedup over batch=1 (≈30 min instead of ~2 h),
  # which is the right tradeoff against random long-tail OOM crashes.
  precompute_ref_batch_size: 4

train:
  output_dir: artifacts/dpo
  num_train_epochs: 1
  learning_rate: 8.0e-7
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  optim: adamw_torch
  # 1st run had max_grad_norm=1.0 with raw grad ~16, so clip fired every step
  # and effective lr collapsed to ~5e-8. For run 2 we disable clipping
  # (1e9 is "off" — HF TrainingArguments doesn't accept None for this field).
  # Implication: effective update step jumps ~16x at the current raw-grad
  # magnitude. If chosen logp starts collapsing in wandb, dial back lr.
  max_grad_norm: 1.0e9
  # effective batch = per_device_train_batch_size * grad_accum * num_gpus
  # target = 128.   single A100 80GB:  1 * 128 * 1 = 128
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 128
  per_device_eval_batch_size: 1
  gradient_checkpointing: true
  bf16: true
  seed: 42
  logging_steps: 1
  eval_strategy: steps
  eval_steps: 25
  save_strategy: steps
  save_steps: 50
  save_total_limit: 3
  report_to: ["wandb"]
  # run_name: auto-derived at runtime from model.name_or_path basename
  # (e.g. scp_stage5_dpo_scp_stage4_oneshot_reverse) so swapping --model
  # gives a distinct wandb run automatically. Override via --run-name on
  # the CLI when you want a custom label.
  run_name_prefix: scp_stage5_dpo

wandb:
  project: scp-stage5
  entity: null                # set via env WANDB_ENTITY if needed

eval_ood:
  enabled: true
  when: end                   # 'end' = run once after training. (other modes not implemented; explicit fail.)
  test_csv: data/test.csv
  source_column: Source_En
  reference_column: Target_Ko
  output_dir: artifacts/dpo/ood_eval
  generation:
    do_sample: false
    temperature: 0.0
    top_p: null
    max_new_tokens: 2048
    on_truncation: discard
  vllm:
    tensor_parallel_size: 1
    dtype: bfloat16
    # 0.85 was too greedy when eval_ood is invoked from inside train_dpo.py
    # — the parent Python process still holds training tensors and CUDA
    # context, leaving ~50 GB free instead of full 80 GB. 0.6 fits a 4-5B
    # model + KV cache comfortably (~48 GB) even with that overhead.
    gpu_memory_utilization: 0.6
  metrics:                    # all three computed; results logged to wandb
    - xcomet
    - BLEU
    - chrF
  metric_settings:
    xcomet:
      model_name: Unbabel/wmt22-comet-da
      batch_size: 8
      gpus: 1
